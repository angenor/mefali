name: mefali_core
description: >-
  Thème Material 3 Mefali (construit depuis docs/design/tokens.md), polices et
  composants partagés des apps Flutter. Aucune transposition DOM/CSS.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  # Pictogrammes Material Symbols Rounded (tree-shaking des glyphes). Version
  # figée (research.md R2).
  material_symbols_icons: 4.2951.0
  # Client Dart GÉNÉRÉ (jamais d'appel HTTP artisanal — constitution I).
  mefali_api_client:
    path: ../../../clients/dart
  # Cache local de la configuration distante (hors-ligne — FR-020). Figée (R7).
  shared_preferences: 2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Horloge simulée pour tester cache/rafraîchissement horaire (T016).
  fake_async: 1.3.3

flutter:
  uses-material-design: true
  fonts:
    # Inter v4.1 embarquée (jamais chargée au runtime — DESIGN §10). OFL 1.1.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
