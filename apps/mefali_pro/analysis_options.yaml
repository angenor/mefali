include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    invalid_annotation_target: ignore
  exclude:
    - lib/l10n/app_localizations*.dart

# Bloc plugins: TOP-LEVEL (jamais sous analyzer:, jamais via include: — R2/T003).
# Pin EXACT riverpod_lint 3.1.4 (hors lockfile), accordé ×3 par
# scripts/verifier-accord-locks.sh (SC-008). Les 3 INFO escaladées en error
# (FR-033). errors:/exclude: ci-dessus sont PRÉEXISTANTS (gen-l10n) — INCHANGÉS.
plugins:
  riverpod_lint:
    version: 3.1.4
    diagnostics:
      avoid_public_notifier_properties: error
      avoid_build_context_in_providers: error
      protected_notifier_properties: error
