# Garage v2.3.0 — configuration mono-nœud dev (research.md R5).
# Secrets (rpc_secret, admin_token) fournis par l'environnement
# (GARAGE_RPC_SECRET, GARAGE_ADMIN_TOKEN) — jamais dans ce fichier (constitution VIII).

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"

# Mono-nœud : un seul réplica. NB : la clé « replication_mode » de Garage 0.x a
# été renommée « replication_factor » en v1.0+ (l'intention research.md R5
# « replication_mode = 1 » = facteur de réplication 1).
replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.local"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.local"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
