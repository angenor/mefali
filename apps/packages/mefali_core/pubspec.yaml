name: mefali_core
description: >-
  Thème Material 3 Mefali (construit depuis docs/design/tokens.md), polices et
  composants partagés des apps Flutter. Aucune transposition DOM/CSS.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  # Délégué de localisation du paquet (gen-l10n → MefaliCoreLocalizations) :
  # les écrans canoniques portent leurs propres clés i18n fr.
  flutter_localizations:
    sdk: flutter
  # Épinglé par le SDK Flutter via flutter_localizations (comme les apps).
  intl: 0.20.2
  # Pictogrammes Material Symbols Rounded (tree-shaking des glyphes). Version
  # figée (research.md R2).
  material_symbols_icons: 4.2951.0
  # Client Dart GÉNÉRÉ (jamais d'appel HTTP artisanal — constitution I).
  mefali_api_client:
    path: ../../../clients/dart
  # dio apparaît dans la surface publique du client généré (Dio, Interceptor,
  # DioException) sans y être ré-exporté : dépendance DIRECTE obligatoire pour
  # poser l'intercepteur d'autorisation. Version alignée sur le client (^5.7.0).
  dio: 5.10.0
  # Cache local de la configuration distante (hors-ligne — FR-020). Figée (R7).
  shared_preferences: 2.5.5
  # ── Cycle CPT (003) — plugins NATIFS stabilisés tôt (cadrage §10.1 : Shorebird
  # ne patche que le Dart ; les ajouter maintenant évite un passage store). ──
  # Jetons de session au repos : chiffré, jamais shared_preferences (research R11).
  flutter_secure_storage: 10.3.1
  # Photo de la pièce d'identité du dossier coursier (research.md R7, R11).
  image_picker: 1.2.3
  # Enregistrement de la note vocale de repère d'adresse (research.md R11).
  record: 7.1.1
  # Lecture de la note vocale de repère d'adresse (research.md R11).
  just_audio: 0.10.6
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Horloge simulée pour tester cache/rafraîchissement horaire (T016).
  fake_async: 1.3.3
  riverpod_generator: ^4.0.4
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
  generate: true
  fonts:
    # Inter v4.1 embarquée (jamais chargée au runtime — DESIGN §10). OFL 1.1.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
