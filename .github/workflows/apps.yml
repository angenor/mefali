name: apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'clients/dart/**'
      - '.github/workflows/apps.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'clients/dart/**'
      - '.github/workflows/apps.yml'

jobs:
  apps:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package:
          - apps/packages/mefali_core
          - apps/mefali_client
          - apps/mefali_pro
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
      - run: flutter pub get
      # ⚠ dart analyze, PAS flutter analyze : flutter analyze NE CHARGE PAS les
      # plugins analysis_server_plugin ⇒ les règles riverpod_lint seraient un
      # no-op silencieux et la CI resterait verte (FR-032/FR-033, R2/R12). La doc
      # using_plugins.md prétend le contraire : elle est fausse sur Flutter 3.44.6.
      # (Job complété par la matrice codegen + garde-fou de dérive en T008.)
      - run: dart analyze
      # Goldens exclus : rendu pixel sensible à la plateforme (générés/vérifiés en local).
      - run: flutter test --exclude-tags golden
